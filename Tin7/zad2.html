<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wprowadz dane</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #6db3f2, #1e69de);
        }
        .form-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 300px;
        }
        input[type="text"], button {
            padding: 10px;
            margin-top: 10px;
            width: 100%;
            box-sizing: border-box; /* Includes padding and border in the element's width and height */
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>Zadanie 7.2</h1>
        <form action="/submit" method="post">
            <label for="name">Wprowadź swoje imię:</label>
            <input type="text" id="name" name="name" required>
            <button type="submit">Zapisz imię i powróć</button>
        </form>
    </div>
</body>
</html>
